  <circle cx="900" cy="200" r="400" fill="#b8593b" opacity="0.06"/>
  <circle cx="300" cy="500" r="300" fill="#c49032" opacity="0.04"/>
  <!-- Logo mark -->
  <rect x="80" y="200" width="56" height="56" rx="12" fill="#2e2b26"/>
  <text x="108" y="236" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="900" fill="#c49032">L</text>
  <!-- Title -->
  <text x="160" y="237" font-family="Georgia, serif" font-size="42" font-weight="900" fill="#faf7f1">The Lever</text>
